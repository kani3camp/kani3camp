# lowlighter/metrics: GitHub profile stats (Classic + tokyonight approx)
# See https://github.com/lowlighter/metrics

name: Metrics
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: kani3camp
          filename: assets/metrics.svg
          template: classic
          base: header, activity, community, repositories
          plugin_languages: yes
          output_action: commit
          config_order: base.header, base.activity, base.community, base.repositories, languages
          extras_css: |
            svg { background-color: #16161e !important; }
            .card { background-color: #16161e !important; border: 1px solid #3d59a1 !important; }
            .text { fill: #c0caf5 !important; }
            .header { fill: #a9b1d6 !important; }
            .content { fill: #787c99 !important; }
            line, [stroke] { stroke: #3d59a1 !important; }
            .icon { fill: #73daca !important; }
            .number { fill: #bb9af7 !important; }
